# Docker Compose configuration for Rex Server
# Deploying to production VPS using a reverse proxy (e.g., Caddy or Nginx)

services:
  rex-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rex-server
    restart: unless-stopped
    env_file:
      - ./config/server.env
    networks:
      - npm-net
    volumes:
      - ./config/app.pem:/etc/rex/app.pem:ro
      - ./config/rex.config.yml:/etc/rex/rex.config.yml:ro

networks:
  npm-net:
    external: true